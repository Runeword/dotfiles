# GitHub auth for private flake inputs (e.g. github:Runeword/permeance).
# Token lives in the untracked, git-ignored sibling file below — never here.
# `!include` (with the bang) is non-fatal if absent, so a machine without the
# secret still evaluates, just without auth.
!include nix-access-tokens.conf
